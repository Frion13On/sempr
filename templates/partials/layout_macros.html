{% macro header_bar(title, show_theme=True, show_back=False, back_url='', show_logout=False, logout_url='') -%}
<div class="header-bar">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="header-logo">
                <h1 class="header-title">{{ title }}</h1>
            </div>
            <div>
                {% if show_theme %}
                <button id="theme-toggle" class="btn btn-light" style="border:none; background:none;"></button>
                {% endif %}
                {% if show_back %}
                <a href="{{ back_url }}" class="btn btn-outline-light nav-btn me-2">
                    <i class="bi bi-arrow-left"></i> Назад
                </a>
                {% endif %}
                {% if show_logout %}
                <a href="{{ logout_url or url_for('auth.logout') }}" class="btn btn-outline-light nav-btn">
                    <i class="bi bi-box-arrow-right"></i> Выход
                </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{%- endmacro %}
